<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RootWit — Reliable Postgres → BigQuery Sync</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #070810;
    --bg1:      #0c0d1a;
    --bg2:      #10111f;
    --surface:  rgba(255,255,255,0.04);
    --border:   rgba(255,255,255,0.07);
    --border-glow: rgba(82,219,212,0.25);
    --text:     #e8eaf0;
    --muted:    #6b7099;
    --cyan:     #52dbd4;
    --cyan-dim: rgba(82,219,212,0.12);
    --violet:   #9b7ff4;
    --violet-dim: rgba(155,127,244,0.12);
    --font-body: 'Outfit', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  /* Animated hero grid */
  .hero-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(82,219,212,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(82,219,212,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridDrift 20s linear infinite;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
  }
  @keyframes gridDrift {
    0% { transform: translateY(0); }
    100% { transform: translateY(60px); }
  }

  /* Glow orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
  }
  .orb-cyan  { background: rgba(82,219,212,0.15); }
  .orb-violet { background: rgba(155,127,244,0.12); }

  /* Glass card */
  .glass {
    background: var(--surface);
    border: 1px solid var(--border);
    backdrop-filter: blur(12px);
    transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
  }
  .glass:hover {
    border-color: var(--border-glow);
    box-shadow: 0 0 32px rgba(82,219,212,0.08), 0 8px 32px rgba(0,0,0,0.4);
    transform: translateY(-2px);
  }

  /* Terminal block */
  .terminal {
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    font-family: var(--font-mono);
    padding: 1.25rem 1.5rem;
    position: relative;
  }
  .terminal::before {
    content: '';
    position: absolute;
    top: 12px; left: 14px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ff5f57;
    box-shadow: 18px 0 0 #febc2e, 36px 0 0 #28c840;
  }
  .terminal-line {
    margin-top: 1.5rem;
    font-size: 0.88rem;
    line-height: 1.8;
  }
  .t-prompt { color: var(--cyan); }
  .t-cmd    { color: #e8eaf0; }
  .t-out    { color: var(--muted); }
  .t-success { color: #52d87c; }
  .t-warn   { color: #f0c96e; }

  /* Roadmap table */
  .roadmap-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }
  .roadmap-row:last-child { border-bottom: none; }
  .roadmap-row:hover { background: rgba(255,255,255,0.02); }

  /* Badge */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-family: var(--font-mono);
    font-weight: 500;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .badge-available { background: rgba(82,216,124,0.12); color: #52d87c; border: 1px solid rgba(82,216,124,0.2); }
  .badge-building  { background: rgba(240,201,110,0.12); color: #f0c96e; border: 1px solid rgba(240,201,110,0.2); }
  .badge-planned   { background: rgba(155,127,244,0.12); color: var(--violet); border: 1px solid rgba(155,127,244,0.2); }

  /* Pillar icon container */
  .pillar-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1rem;
    flex-shrink: 0;
  }

  /* CTA input */
  .cta-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.95rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  .cta-input:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 3px rgba(82,219,212,0.1);
  }
  .cta-input::placeholder { color: var(--muted); }

  .btn-primary {
    background: linear-gradient(135deg, var(--cyan), #3dc4c0);
    color: #070810;
    border: none;
    border-radius: 8px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 0.95rem;
    padding: 0.75rem 1.5rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    white-space: nowrap;
    letter-spacing: 0.01em;
  }
  .btn-primary:hover {
    opacity: 0.9;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(82,219,212,0.35);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 0.9rem;
    padding: 0.6rem 1.1rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    display: inline-flex; align-items: center; gap: 6px;
    text-decoration: none;
  }
  .btn-ghost:hover {
    border-color: rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.04);
  }

  /* Gradient text */
  .grad-text {
    background: linear-gradient(135deg, var(--cyan) 0%, var(--violet) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Fade-in on scroll */
  .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.65s ease, transform 0.65s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* Divider */
  .section-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 0 auto;
    max-width: 900px;
  }

  /* Founder placeholder */
  .founder-photo {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 2px solid var(--border-glow);
    background: linear-gradient(135deg, rgba(82,219,212,0.15), rgba(155,127,244,0.15));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 1.4rem;
    color: var(--cyan);
    flex-shrink: 0;
  }

  /* Nav logo pulse */
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--cyan);
    box-shadow: 0 0 0 0 rgba(82,219,212,0.5);
    animation: pulse 2.5s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(82,219,212,0.5); }
    50% { box-shadow: 0 0 0 6px rgba(82,219,212,0); }
  }

  /* Comparison arrow */
  .arrow-line {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--cyan);
    font-weight: 600;
  }

  /* Typewriter cursor */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .cursor { animation: blink 1.1s step-end infinite; }

  /* Noise texture overlay */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* ── Aurora mesh background ── */
  .aurora {
    position: absolute; inset: 0; overflow: hidden; pointer-events: none;
  }
  .aurora-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    animation: auroraFloat 14s ease-in-out infinite alternate;
  }
  @keyframes auroraFloat {
    0%   { transform: translate(0,0) scale(1); }
    33%  { transform: translate(40px,-30px) scale(1.08); }
    66%  { transform: translate(-30px,20px) scale(0.95); }
    100% { transform: translate(20px,40px) scale(1.05); }
  }

  /* ── Log ticker marquee ── */
  .ticker-wrap {
    overflow: hidden;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.35);
    padding: 0.6rem 0;
    position: relative;
  }
  .ticker-wrap::before, .ticker-wrap::after {
    content: '';
    position: absolute; top:0; bottom:0; width:80px; z-index:2; pointer-events:none;
  }
  .ticker-wrap::before { left:0; background: linear-gradient(90deg,var(--bg),transparent); }
  .ticker-wrap::after  { right:0; background: linear-gradient(-90deg,var(--bg),transparent); }
  .ticker-track {
    display: flex; gap: 3rem; width: max-content;
    animation: tickerScroll 38s linear infinite;
    font-family: var(--font-mono); font-size: 0.75rem;
  }
  @keyframes tickerScroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-item {
    display: inline-flex; align-items: center; gap:0.5rem; white-space:nowrap;
  }
  .ticker-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }

  /* ── Pipeline SVG ── */
  .pipeline-section {
    padding: 5rem 2rem;
    position: relative;
    overflow: hidden;
  }
  .node-box {
    rx: 10;
  }

  /* ── Count-up ── */
  .stat-num { font-variant-numeric: tabular-nums; }

  /* ── Scan line on terminal ── */
  .terminal::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(82,219,212,0.6), transparent);
    animation: scanLine 3s ease-in-out infinite;
    border-radius: 10px 10px 0 0;
  }
  @keyframes scanLine {
    0%   { top: 0; opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }

  /* Glow line under hero heading */
  .heading-glow {
    position: relative;
  }
  .heading-glow::after {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: -4px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.3;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

/* ─── Inline SVG icons ─── */
const ICONS = {
  github: `<path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>`,
  zap: `<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>`,
  'check-circle': `<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>`,
  binary: `<rect x="14" y="2" width="4" height="6" rx="2"/><rect x="6" y="16" width="4" height="6" rx="2"/><path d="M6 8v4"/><path d="M18 14v4"/><path d="M6 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h2"/><path d="M18 20h2a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2"/>`,
  'indian-rupee': `<path d="M6 3h12"/><path d="M6 8h12"/><path d="m6 13 8.5 8"/><path d="M6 13h3"/><path d="M9 13c6.667 0 6.667-10 0-10"/>`,
  'shield-check': `<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/>`,
};
function Icon({ name, size = 18, color = 'currentColor', style }) {
  const paths = ICONS[name] || '';
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
      style={{ display:'inline-block', flexShrink:0, ...style }}
      dangerouslySetInnerHTML={{ __html: paths }}
    />
  );
}

/* ─── Log Ticker ─── */
function LogTicker() {
  const events = [
    { color:'#52d87c', text:'✓ Synced 12,048 rows → bigquery.prod.users' },
    { color:'#52dbd4', text:'⚡ Schema change detected: orders.discount_code added' },
    { color:'#52dbd4', text:'✓ Cursor saved lsn=0/4B2A100' },
    { color:'#f0c96e', text:'⚠ Retrying batch after network hiccup (attempt 2/3)' },
    { color:'#52d87c', text:'✓ Synced 8,391 rows → bigquery.prod.events' },
    { color:'#52dbd4', text:'✓ WAL position confirmed. No gaps.' },
    { color:'#52d87c', text:'✓ Synced 31,774 rows → bigquery.prod.transactions' },
    { color:'#9b7ff4', text:'↻ Incremental sync started at 14:02:31 UTC' },
    { color:'#52d87c', text:'✓ Schema snapshot updated. 3 tables tracked.' },
    { color:'#f0c96e', text:'⚡ New column: payments.upi_reference — auto-migrated' },
    { color:'#52dbd4', text:'✓ Heartbeat OK. Pipeline healthy.' },
    { color:'#52d87c', text:'✓ Synced 5,220 rows → bigquery.prod.sessions' },
  ];
  const doubled = [...events, ...events];
  return (
    <div className="ticker-wrap">
      <div className="ticker-track">
        {doubled.map((e, i) => (
          <span key={i} className="ticker-item">
            <span className="ticker-dot" style={{ background: e.color, boxShadow:`0 0 6px ${e.color}` }}/>
            <span style={{ color: e.color }}>{e.text}</span>
          </span>
        ))}
      </div>
    </div>
  );
}

/* ─── Pipeline Diagram ─── */
function PipelineViz() {
  // SVG viewBox 0 0 760 220
  // Postgres: left box, RootWit: center hex/circle, BigQuery: right box
  const packets1 = [0, 0.33, 0.66];
  const packets2 = [0.16, 0.5, 0.83];
  return (
    <section className="pipeline-section">
      <div style={{ position:'absolute', inset:0, background:'radial-gradient(ellipse 60% 70% at 50% 50%, rgba(82,219,212,0.04) 0%, transparent 70%)', pointerEvents:'none' }}/>
      <div className="reveal" style={{ textAlign:'center', marginBottom:'2.5rem' }}>
        <div style={{ fontFamily:'var(--font-mono)', fontSize:'0.78rem', color:'var(--cyan)', letterSpacing:'0.1em', textTransform:'uppercase', marginBottom:'0.75rem' }}>How it works</div>
        <h2 style={{ fontSize:'clamp(1.8rem,3.5vw,2.4rem)', fontWeight:800, letterSpacing:'-0.03em' }}>
          Your data, always moving.<br/>
          <span style={{ color:'var(--muted)', fontWeight:500 }}>Never silently stopped.</span>
        </h2>
      </div>
      <div className="reveal" style={{ maxWidth:820, margin:'0 auto', position:'relative' }}>
        <svg viewBox="0 0 760 220" style={{ width:'100%', overflow:'visible' }}>
          <defs>
            <filter id="glow-cyan">
              <feGaussianBlur stdDeviation="4" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="glow-violet">
              <feGaussianBlur stdDeviation="4" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <linearGradient id="pipe1" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stopColor="#52dbd4" stopOpacity="0.6"/>
              <stop offset="100%" stopColor="#52dbd4" stopOpacity="0.2"/>
            </linearGradient>
            <linearGradient id="pipe2" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stopColor="#9b7ff4" stopOpacity="0.2"/>
              <stop offset="100%" stopColor="#9b7ff4" stopOpacity="0.6"/>
            </linearGradient>
            <path id="path1" d="M 210 110 C 270 110, 310 110, 348 110" fill="none"/>
            <path id="path2" d="M 412 110 C 450 110, 490 110, 550 110" fill="none"/>
          </defs>

          {/* ── Track lines ── */}
          <path d="M 210 110 C 270 110, 310 110, 348 110" stroke="url(#pipe1)" strokeWidth="2" fill="none" strokeDasharray="4 4"/>
          <path d="M 412 110 C 450 110, 490 110, 550 110" stroke="url(#pipe2)" strokeWidth="2" fill="none" strokeDasharray="4 4"/>

          {/* ── Postgres node ── */}
          <rect x="20" y="70" width="190" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(82,219,212,0.25)" strokeWidth="1.5"/>
          <rect x="20" y="70" width="190" height="80" rx="12" fill="none" stroke="rgba(82,219,212,0.08)" strokeWidth="8"/>
          <text x="115" y="100" textAnchor="middle" fill="#e8eaf0" fontSize="13" fontFamily="var(--font-mono)" fontWeight="600">PostgreSQL</text>
          <text x="115" y="120" textAnchor="middle" fill="#6b7099" fontSize="10" fontFamily="var(--font-mono)">prod-db:5432</text>
          <text x="115" y="136" textAnchor="middle" fill="#52dbd4" fontSize="9" fontFamily="var(--font-mono)">WAL streaming</text>

          {/* ── RootWit node (center glow) ── */}
          <circle cx="380" cy="110" r="64" fill="rgba(82,219,212,0.04)" stroke="rgba(82,219,212,0.3)" strokeWidth="1.5" filter="url(#glow-cyan)"/>
          <circle cx="380" cy="110" r="50" fill="rgba(7,8,16,0.9)" stroke="rgba(82,219,212,0.15)" strokeWidth="1"/>
          <circle cx="380" cy="110" r="64" fill="none" stroke="rgba(82,219,212,0.06)" strokeWidth="1">
            <animate attributeName="r" values="64;70;64" dur="3s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/>
          </circle>
          <text x="380" y="106" textAnchor="middle" fill="#52dbd4" fontSize="14" fontFamily="var(--font-mono)" fontWeight="700">RootWit</text>
          <text x="380" y="122" textAnchor="middle" fill="#6b7099" fontSize="9" fontFamily="var(--font-mono)">cursor · schema · recovery</text>

          {/* ── BigQuery node ── */}
          <rect x="550" y="70" width="190" height="80" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(155,127,244,0.25)" strokeWidth="1.5"/>
          <rect x="550" y="70" width="190" height="80" rx="12" fill="none" stroke="rgba(155,127,244,0.08)" strokeWidth="8"/>
          <text x="645" y="100" textAnchor="middle" fill="#e8eaf0" fontSize="13" fontFamily="var(--font-mono)" fontWeight="600">BigQuery</text>
          <text x="645" y="120" textAnchor="middle" fill="#6b7099" fontSize="10" fontFamily="var(--font-mono)">your-project.dataset</text>
          <text x="645" y="136" textAnchor="middle" fill="#9b7ff4" fontSize="9" fontFamily="var(--font-mono)">batch inserts</text>

          {/* ── Flowing packets on path1 ── */}
          {packets1.map((delay, i) => (
            <circle key={i} r="5" fill="#52dbd4" filter="url(#glow-cyan)" opacity="0.9">
              <animateMotion dur="2s" repeatCount="indefinite" begin={`${delay * 2}s`}>
                <mpath href="#path1"/>
              </animateMotion>
              <animate attributeName="opacity" values="0;1;1;0" dur="2s" repeatCount="indefinite" begin={`${delay * 2}s`}/>
            </circle>
          ))}

          {/* ── Flowing packets on path2 ── */}
          {packets2.map((delay, i) => (
            <circle key={i} r="5" fill="#9b7ff4" filter="url(#glow-violet)" opacity="0.9">
              <animateMotion dur="2s" repeatCount="indefinite" begin={`${delay * 2}s`}>
                <mpath href="#path2"/>
              </animateMotion>

/* ─── Intersection observer reveal ─── */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
    }, { threshold: 0.12 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
}

/* ─── Typewriter ─── */
function Typewriter({ phrases, speed = 60, pause = 1800 }) {
  const [text, setText] = useState('');
  const [pi, setPi] = useState(0);
  const [deleting, setDeleting] = useState(false);
  useEffect(() => {
    const cur = phrases[pi];
    const delay = deleting ? 30 : speed;
    const timer = setTimeout(() => {
      if (!deleting) {
        if (text.length < cur.length) setText(cur.slice(0, text.length + 1));
        else setTimeout(() => setDeleting(true), pause);
      } else {
        if (text.length > 0) setText(cur.slice(0, text.length - 1));
        else { setDeleting(false); setPi((pi + 1) % phrases.length); }
      }
    }, delay);
    return () => clearTimeout(timer);
  }, [text, deleting, pi]);
  return <span>{text}<span className="cursor">|</span></span>;
}

/* ─── Count-up hook ─── */
function useCountUp(target, duration = 1400, started = false) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!started || typeof target !== 'number') return;
    let start = null;
    const step = (ts) => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / duration, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      setVal(Math.floor(ease * target));
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [started, target]);
  return val;
}

/* ─── Stats bar ─── */
function StatItem({ label, prefix='', value, suffix='', numeric, color='var(--cyan)' }) {
  const [vis, setVis] = useState(false);
  const ref = React.useRef(null);
  const counted = useCountUp(numeric || 0, 1200, vis);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVis(true); io.disconnect(); }}, { threshold: 0.5 });
    io.observe(ref.current);
    return () => io.disconnect();
  }, []);
  const display = numeric != null ? `${prefix}${counted.toLocaleString()}${suffix}` : value;
  return (
    <div ref={ref} style={{ textAlign:'center', padding:'0.5rem' }}>
      <div className="stat-num" style={{ fontSize:'1.8rem', fontWeight:800, letterSpacing:'-0.04em', color, lineHeight:1 }}>{display}</div>
      <div style={{ fontSize:'0.78rem', color:'var(--muted)', marginTop:5 }}>{label}</div>
    </div>
  );
}
